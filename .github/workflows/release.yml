name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: true

jobs:
  build:
    uses: ./.github/workflows/build-binaries.yml
    with:
      publish: true

  publish:
    needs: build
    if: ${{ github.event_name == 'push' || inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token for npm trusted publishing
      contents: read
    steps:
      # setup-node writes ~/.npmrc pointing at the npm registry. Auth is via
      # OIDC (id-token) trusted publishing, not a stored token. Node 24 bundles
      # npm >= 11.5.1, the floor trusted publishing requires.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staged-npm
          path: dist/release/npm
      - name: Verify tag matches staged version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -e "console.log(require('./dist/release/npm/viewmd/package.json').version)")
          test "$TAG" = "$PKG" || { echo "tag $TAG != package $PKG"; exit 1; }
      - name: Resolve npm dist-tag from version
        run: |
          VERSION=$(node -p "require('./dist/release/npm/viewmd/package.json').version")
          # A semver prerelease (0.1.0-beta.0) has a hyphen; publish it under beta.
          case "$VERSION" in
            *-*) NPM_TAG=beta ;;
            *) NPM_TAG=latest ;;
          esac
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_ENV"
          echo "Publishing $VERSION under dist-tag: $NPM_TAG"
      - name: Dry-run publish
        run: |
          set -e
          for dir in dist/release/npm/viewmd-* dist/release/npm/viewmd; do
            (cd "$dir" && npm publish --dry-run --provenance --tag "$NPM_TAG")
          done
      - name: Publish platform packages then root
        run: |
          set -e
          publish() {
            dir="$1"
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version; already published."
              return
            fi
            (cd "$dir" && npm publish --provenance --tag "$NPM_TAG")
          }
          for dir in dist/release/npm/viewmd-*; do publish "$dir"; done
          publish dist/release/npm/viewmd

  github-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: viewmd-*
          path: artifacts
      - name: Package binaries
        run: |
          mkdir -p release-assets
          for d in artifacts/viewmd-*; do
            id=$(basename "$d")
            tar -czf "release-assets/${id}.tar.gz" -C "$d" .
          done
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
